<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather Station Dashboard</title>
    
    <script src="./chart.umd.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #141e30;
            --card-border: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            /* Metric Accent Colors */
            --temp-color: #FF9F43;
            --humidity-color: #00D2FC;
            --pressure-color: #A855F7;
            --wind-color: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
        }

        /* 4-Column Grid for Weather Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover, .card.active {
            transform: translateY(-2px);
        }

        .card.active[data-metric="temperature"] { border-color: var(--temp-color); box-shadow: 0 0 15px rgba(255, 159, 67, 0.1); }
        .card.active[data-metric="humidity"] { border-color: var(--humidity-color); box-shadow: 0 0 15px rgba(0, 210, 252, 0.1); }
        .card.active[data-metric="pressure"] { border-color: var(--pressure-color); box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); }
        .card.active[data-metric="wind_speed"] { border-color: var(--wind-color); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .card[data-metric="temperature"] .card-title::before { background-color: var(--temp-color); }
        .card[data-metric="humidity"] .card-title::before { background-color: var(--humidity-color); }
        .card[data-metric="pressure"] .card-title::before { background-color: var(--pressure-color); }
        .card[data-metric="wind_speed"] .card-title::before { background-color: var(--wind-color); }

        .card-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .card[data-metric="temperature"] .card-value { color: var(--temp-color); }
        .card[data-metric="humidity"] .card-value { color: var(--humidity-color); }
        .card[data-metric="pressure"] .card-value { color: var(--pressure-color); }
        .card[data-metric="wind_speed"] .card-value { color: var(--wind-color); }

        .sparkline-container {
            width: 100%;
            height: 50px;
            margin-bottom: 0.75rem;
        }

        .card-footer {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Main Historical Trend Graph Container */
        .main-chart-container {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 2rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chart-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cloud Weather Telemetry Platform</h1>
        <div id="status" class="status-badge">Connecting to cloud system...</div>
    </div>

    <div class="grid-container">
        <div class="card active" data-metric="temperature" onclick="switchMetric('temperature')">
            <div class="card-title">Temperature</div>
            <div id="val-temperature" class="card-value">--.-<span style="font-size:1.2rem"> °C</span></div>
            <div class="sparkline-container"><canvas id="spark-temperature"></canvas></div>
            <div id="diff-temperature" class="card-footer">→ 0.0 °C since last</div>
        </div>

        <div class="card" data-metric="humidity" onclick="switchMetric('humidity')">
            <div class="card-title">Humidity</div>
            <div id="val-humidity" class="card-value">--<span style="font-size:1.2rem"> %</span></div>
            <div class="sparkline-container"><canvas id="spark-humidity"></canvas></div>
            <div id="diff-humidity" class="card-footer">→ 0 % since last</div>
        </div>

        <div class="card" data-metric="pressure" onclick="switchMetric('pressure')">
            <div class="card-title">Pressure</div>
            <div id="val-pressure" class="card-value">----<span style="font-size:1.2rem"> hPa</span></div>
            <div class="sparkline-container"><canvas id="spark-pressure"></canvas></div>
            <div id="diff-pressure" class="card-footer">→ 0 hPa since last</div>
        </div>

        <div class="card" data-metric="wind_speed" onclick="switchMetric('wind_speed')">
            <div class="card-title">Wind Speed</div>
            <div id="val-wind_speed" class="card-value">--.-<span style="font-size:1.2rem"> m/s</span></div>
            <div class="sparkline-container"><canvas id="spark-wind_speed"></canvas></div>
            <div id="diff-wind_speed" class="card-footer">→ 0.0 m/s since last</div>
        </div>
    </div>

    <div class="main-chart-container">
        <div class="chart-header">
            <div id="main-chart-title" class="chart-title">Temperature Trend</div>
            <div class="chart-subtitle">tap a card above to switch metric · last 40 readings</div>
        </div>
        <div class="chart-wrapper">
            <canvas id="mainTrendChart"></canvas>
        </div>
    </div>

    <script>
        // =================================================================
        // 🛠️ CONFIGURATION - PASTE YOUR SUPABASE CREDENTIALS HERE
        // =================================================================
        const SUPABASE_URL = "https://picfdcjhupsertopqhey.supabase.co"; // 👈 Keep ending at .co (No /rest/v1/)
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpY2ZkY2podXBzZXJ0b3BxaGV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDIwNjcsImV4cCI6MjA5ODM3ODA2N30.ETYwUnoolA9sm1-DQKre9G4BRy6MAUBduvgaVvzs3Zw";

        let currentMetric = 'temperature';
        let mainChartInstance = null;
        let sparkInstances = {};
        
        // Premium Visual Configurations: Solid outlines + 15% transparent soft trails
        const metricConfigs = {
            temperature: {
                label: 'Temperature (°C)',
                borderColor: '#FF9F43',
                backgroundColor: 'rgba(255, 159, 67, 0.15)', 
                unit: ' °C'
            },
            humidity: {
                label: 'Humidity (%)',
                borderColor: '#00D2FC',
                backgroundColor: 'rgba(0, 210, 252, 0.15)',
                unit: ' %'
            },
            pressure: {
                label: 'Atmospheric Pressure (hPa)',
                borderColor: '#A855F7',
                backgroundColor: 'rgba(168, 85, 247, 0.15)',
                unit: ' hPa'
            },
            wind_speed: {
                label: 'Wind Velocity (m/s)',
                borderColor: '#10B981',
                backgroundColor: 'rgba(16, 185, 129, 0.15)',
                unit: ' m/s'
            }
        };

        // Fetch telemetry loop
        async function loadDashboardData() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/readings?order=created_at.desc&limit=40`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Database connectivity error");
                
                const data = await response.reverse(); // Flip to chronological order (left-to-right)
                
                if (data.length === 0) {
                    document.getElementById('status').innerText = 'Online (Waiting for ESP)';
                    return;
                }

                document.getElementById('status').innerText = `Live Analytics Sync Done (${new Date().toLocaleTimeString()})`;
                
                updateMetricCards(data);
                renderSparklines(data);
                renderMainChart(data);

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = 'Supabase Connection Refused';
            }
        }

        // Display current values and compute directional differences
        function updateMetricCards(data) {
            const latest = data[data.length - 1];
            const previous = data.length > 1 ? data[data.length - 2] : latest;

            Object.keys(metricConfigs).forEach(metric => {
                const currentVal = latest[metric];
                const prevVal = previous[metric];
                const diff = (currentVal - prevVal).toFixed(metric === 'humidity' || metric === 'pressure' ? 0 : 1);
                
                // Update text number
                document.getElementById(`val-${metric}`).innerHTML = `${currentVal}<span style="font-size:1.2rem">${metricConfigs[metric].unit}</span>`;
                
                // Update comparative footer
                const sign = diff > 0 ? '+' : '';
                document.getElementById(`diff-${metric}`).innerText = `${sign}${diff} ${metricConfigs[metric].unit} since last`;
            });
        }

        // Render card background preview sparklines
        function renderSparklines(data) {
            Object.keys(metricConfigs).forEach(metric => {
                const canvas = document.getElementById(`spark-${metric}`);
                if (!canvas) return;

                const values = data.map(row => row[metric]);
                
                if (sparkInstances[metric]) {
                    sparkInstances[metric].data.datasets[0].data = values;
                    sparkInstances[metric].update('none');
                    return;
                }

                sparkInstances[metric] = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: values,
                        datasets: [{
                            data: values,
                            borderColor: metricConfigs[metric].borderColor,
                            backgroundColor: metricConfigs[metric].backgroundColor,
                            fill: true,
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        scales: { x: { display: false }, y: { display: false } }
                    }
                });
            });
        }

        // Generate main timeline canvas with premium color trail profiles
        function renderMainChart(data) {
            const ctx = document.getElementById('mainTrendChart').getContext('2d');
            const timelineLabels = data.map(row => {
                const t = new Date(row.created_at);
                return t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            });
            const metricValues = data.map(row => row[currentMetric]);
            const config = metricConfigs[currentMetric];

            if (mainChartInstance) {
                mainChartInstance.data.labels = timelineLabels;
                mainChartInstance.data.datasets[0].data = metricValues;
                mainChartInstance.data.datasets[0].label = config.label;
                mainChartInstance.data.datasets[0].borderColor = config.borderColor;
                mainChartInstance.data.datasets[0].backgroundColor = config.backgroundColor;
                mainChartInstance.update();
                return;
            }

            mainChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timelineLabels,
                    datasets: [{
                        label: config.label,
                        data: metricValues,
                        borderColor: config.borderColor,
                        backgroundColor: config.backgroundColor, // Applied transparency trail
                        fill: true,
                        borderWidth: 3,
                        pointBackgroundColor: config.borderColor,
                        pointHoverRadius: 7,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#64748b' }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#64748b' }
                        }
                    }
                }
              });

        }

        // Handle metric switching tabs cleanly
        function switchMetric(metric) {
            currentMetric = metric;
            
            // Toggle active styling states on HTML elements
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelector(`.card[data-metric="${metric}"]`).classList.add('active');
            
            // Alter title display tag
            document.getElementById('main-chart-title').innerText = `${metric.replace('_', ' ').toUpperCase()} TREND`;
            
            // Re-fetch instantly to smooth shift data vectors
            loadDashboardData();
        }

        // Active Pooling Loops - Refreshes silently every 5 seconds
        loadDashboardData();
        setInterval(loadDashboardData, 5000);
    </script>
</body>
</html>
